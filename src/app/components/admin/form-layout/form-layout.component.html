<main class="w-full flex items-center justify-center">
    <section class="h-tall:card-xl h-md:card-md h-short:card-sm h-lg:card-lg w-[866px] xl:w-[936px] bg-[#FFF8F0] shadow-lg text-[#2E2E2E] px-6 pb-6 xl:px-12 xl:pt-6 xl:pb-12 flex flex-col justify-between">
        <div class="py-4 border-b-4 border-[#6F4E37]">
            <span class="text-4xl font-bold">{{ title }}</span>
        </div>
        <ng-content></ng-content>
        <div class="flex justify-center">
            <button (click)="submit()" class="py-2 px-16 cursor-pointer rounded-lg bg-[#7D9A38] shadow-sm"><span
                    class="text-lg font-semibold text-[#FFF8F0]">{{ buttonText }}</span>
            </button>
        </div>
    </section>
</main>
