<app-login-layout title="Login">
    <form [formGroup]="loginForm"
        class="bg-[#DDB892] border-8 border-[#6F4E37] w-[500px] h-[500px] rounded-2xl flex flex-col items-center justify-between px-12 py-16">
        <section class="flex flex-col gap-12 w-full text-[#2E2E2E]">
            <app-input
                formControlName="email"
                inputName="email"
                type="email"
                label="Email"
                placeholder="carlos.jose@gmail.com"
            ></app-input>
            <app-input
                formControlName="password"
                inputName="password"
                type="password"
                label="Senha"
            ></app-input>
        </section>
        <section class="flex flex-row justify-evenly w-full gap-6">
            <button class="py-2 w-full cursor-pointer rounded-lg bg-[#FFF8F0] border-2 border-[#5F0F40]">
                <span class="text-lg font-semibold text-[#2E2E2E]">Cadastrar</span>
            </button>
            <button class="py-2 w-full cursor-pointer rounded-lg bg-[#7D9A38]">
                <span class="text-lg font-semibold text-[#FFF8F0]">Entrar</span>
            </button>
        </section>
    </form>
</app-login-layout>
