<main> 
    <app-table
        title="Usuários"
        [hasSearch]="true"
        [columns]="columns"
        [data]="data"
        (delete)="delete($event)"
        (search)="search($event)"
    ></app-table>
    <section class="ml-6 flex flex-col">
        <div class="">
            <p-select 
                [options]="options"
                [(ngModel)]="selectedClient"
                optionLabel="label"
                optionValue="value"
                placeholder="Selecione um cliente"
                class="w-full md:w-56">
            </p-select>
    
            <button (click)="getOrdersGreater(selectedClient)" 
                class="ml-8 mt-4 cursor-pointer bg-[#7D9A38] text-white px-4 py-2 rounded">
                Comparar
            </button>
        </div>
        <div class="mt-4">
            <div class="flex flex-row gap-2">
                <button (click)="getOrderCount()" 
                    class="cursor-pointer bg-[#7D9A38] text-white px-4 py-2 rounded" >
                    Contar pedidos
                </button>
                @if (hasOrderCount) {
                <button (click)="hasOrderCount=false" 
                    class="cursor-pointer bg-transparent active:bg-white border-2 border-[#7D7D7D] text-[#2E2E2E] px-4 py-2 rounded-full" >
                    X
                </button>
                }
            </div>
            <div class="bg-white w-[10%] rounded">
                @if (hasOrderCount) {
                    @for (user of totalOrders; track user.userId) {
                        <div class="m-2 mt-3 items-center grid grid-cols-2">
                            <span class="text-lg text-center font-medium">{{ user.name }}</span>
                            <span class="text-lg text-center font-medium">{{ user.totalOrders }}</span>
                        </div>
                        <div class="bg-[#6F4E37] h-0.5"></div>
                    }
                }
            </div>
        </div>
    </section>
</main>
